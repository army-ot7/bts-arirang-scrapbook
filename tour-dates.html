<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Dates | BTS Arirang Scrapbook</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      background:white;
      color:#111;
    }

    .page{
      min-height:100vh;
      background:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:30px 90px;
    }

    .logo{
      display:flex;
      align-items:center;
      font-family:'Playfair Display', serif;
      font-size:20px;
      font-weight:400;
    }

    .logo img{
      width:60px;
      height:60px;
      object-fit:contain;
    }

    ul{
      display:flex;
      gap:50px;
      list-style:none;
    }

    li a{
      text-decoration:none;
      color:black;
      font-size:14px;
      transition:.3s;
    }

    li a:hover{
      color:#b85c5c;
    }

    .title{
      padding:40px 90px 0;
      margin-bottom:26px;
      margin-top:-10px;
    }

    .title h1{
      font-family:'Playfair Display', serif;
      font-size:55px;
      line-height:.9;
      font-weight:400;
      margin:0;
    }

    .title p{
      font-size:15px;
      margin-top:20px;
      color:#686666;
    }

    .layout{
      display:grid;
      grid-template-columns:340px 1fr;
      gap:42px;
      align-items:start;
      padding:20px 90px 90px;
    }

    

    .timeline-panel{
      max-height:720px;
      overflow-y:auto;
      padding-right:18px;
      border-right:1px solid #ddd;
    }

    .timeline-panel::-webkit-scrollbar{
      width:6px;
    }

    .timeline-panel::-webkit-scrollbar-thumb{
      background:#b85c5c;
      border-radius:20px;
    }

    .city-group{
      margin-bottom:34px;
    }

    .city-name{
      color:#b85c5c;
      font-size:16px;
      font-weight:bold;
      letter-spacing:.5px;
      margin-bottom:18px;
      text-transform:uppercase;
    }

    .date-item{
      position:relative;
      display:grid;
      grid-template-columns:36px 60px 1fr;
      gap:12px;
      align-items:center;
      min-height:58px;
      color:#111;
      text-decoration:none;
      border-radius:14px;
      transition:.2s ease;
    }

    .date-item:hover{
      background:rgba(184,92,92,.08);
      transform:translateX(4px);
    }

    .date-item::before{
      content:"";
      position:absolute;
      left:13px;
      top:0;
      bottom:0;
      width:2px;
      background:#d6d6d6;
      z-index:0;
    }

    .date-item:first-of-type::before{
      top:50%;
    }

    .date-item:last-child::before{
      bottom:50%;
    }

    .dot{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid #aaa;
      background:white;
      z-index:1;
      margin-left:5px;
    }

    .date-item.completed .dot{
      background:#b85c5c;
      border-color:#b85c5c;
    }

    .date-item.completed::before{
      background:#b85c5c;
    }

    .day{
      font-weight:bold;
      font-size:15px;
    }

    .date{
      font-size:14px;
      color:#333;
    }

    .map-area{
      position:relative;
      min-height:600px;
      border-radius:28px;
      overflow:hidden;
      background:#fff;
      border:1px solid #f3e5eb;
      box-shadow:0 20px 45px rgba(80,30,30,.12);
    }

    #tourMap{
      width:100%;
      height:500px;
      border-radius:28px;
      z-index:1;
    }

    .leaflet-container{
      font-family:'Poppins', sans-serif;
      background:#fdf7f7;
    }

    .leaflet-popup-content-wrapper{
      border-radius:18px;
      box-shadow:0 10px 30px rgba(90,30,30,.18);
    }

    .leaflet-popup-content{
      margin:15px 18px;
    }

    .popup-city{
      font-weight:600;
      color:#7b2f2f;
      font-size:15px;
      margin-bottom:3px;
    }

    .popup-venue{
      font-size:12px;
      color:#777;
      margin-bottom:10px;
    }

    .popup-link{
      display:inline-block;
      color:#b85c5c;
      text-decoration:none;
      font-weight:600;
      font-size:13px;
    }

    .custom-pin span{
      display:block;
      width:17px;
      height:17px;
      border-radius:50%;
      border:3px solid white;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
    }

    .completed-pin span{
      background:#b85c5c;
    }

    .upcoming-pin span{
      background:white;
      border:3px solid #b85c5c;
    }

    .legend{
      position:absolute;
      bottom:26px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:30px;
      padding:14px 28px;
      border:1px solid #eadce2;
      border-radius:16px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(8px);
      font-size:14px;
      z-index:500;
      box-shadow:0 10px 25px rgba(80,30,30,.12);
    }

    .legend span{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .legend-dot{
      width:14px;
      height:14px;
      border-radius:50%;
      border:2px solid #b85c5c;
      background:white;
      display:inline-block;
    }

    .legend-dot.done{
      background:#b85c5c;
      border-color:#b85c5c;
    }

    html{
     scroll-behavior:smooth;
    }

    
  .footer{
    position:relative;
    max-width:1400px;
    margin:0 auto;
    padding:34px 70px;
    background:#ffffff;
    display:grid;
    grid-template-columns:1fr  1fr;
    align-items:center;

   border-top:1px solid rgba(120,70,45,.18);

   font-size:.85rem;
   letter-spacing:.5px;
  }

  .footer p{
    margin:0;
  }

  .footer-center{
    text-align:center;
  }

  .footer p:last-of-type{
    text-align:right;
  }

  .mobile-map-btn{
  display:none !important;
}

@media(max-width:900px){

  .page{
    padding:0;
  }
  nav{
    padding:10px;
  }
  ul{
    gap:10px;
  }
  .layout, .title{ 
   padding-left:20px; 
   padding-right:20px; 
  } 

  .timeline-panel{ 
   max-height:none; 
   border-right:none; 
   border-bottom:1px solid #ddd; 
   padding-bottom:30px; 
  } 

  .map-area{ 
   min-height:520px; 
  } 

  #tourMap{
   height:520px; 
  } 


  .legend{ 
   bottom:18px; 
   gap:18px; 
   padding:12px 18px;
   font-size:12px;
 }  

  .mobile-map-btn{
    display:flex !important;
    align-items:center;
    justify-content:center;

    position:fixed !important;
    left:50% !important;
    bottom:22px !important;
    transform:translateX(-50%) !important;
    z-index:99999 !important;

    width:280px;
    max-width:360px;
    height:auto;

    padding:13px 22px;
    border:none;
    border-radius:999px;

    background:#b85c5c;
    color:white;

    font-family:'Poppins', sans-serif;
    font-size:13px;
    font-weight:600;

    box-shadow:0 10px 25px rgba(184,92,92,.35);
    cursor:pointer;
  }
  .layout{
    display:block;
   padding-bottom:120px;
  }
}
@media(max-width:600px){
.footer{
  grid-template-columns:1fr;
  gap:12px;
  text-align:center;
  padding:30px 20px 30px;
}

.footer p,
.footer p:last-of-type{
  text-align:center;
}
}
@media(max-width: 768px){

    nav{
        padding: 22px 28px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
    }

    nav .logo{
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
        width: 135px;
    }

    nav .logo img{
        width: 34px;
        height: auto;
    }

    nav .logo span{
        font-size: 14px;
        line-height: 1.1;
    }

    nav ul{
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 13px;
        margin: 0;
        padding: 0;
        flex-wrap: nowrap;
    }

    nav ul li,
    nav ul li a{
        font-size: 11px;
        line-height: 1.15;
        text-align: center;
        white-space: normal;
    }
}

.leaflet-tile-pane{ 
filter: sepia(12%) saturate(80%) contrast(92%) brightness(104%); }

  function isCompleted(dateText){
    return new Date(dateText) < today;
  }

  function cityCompleted(city){
    const lastDate = city.dates[city.dates.length - 1];
    return isCompleted(lastDate);
  }

  function loadTimeline(){
    const timeline = document.getElementById("timeline");

    tourCities.forEach(city => {
      const cityBox = document.createElement("div");
      cityBox.className = "city-group";

      cityBox.innerHTML = `
        <h3 class="city-name">${city.city}</h3>
      `;

      city.dates.forEach((date, index) => {
        const item = document.createElement("a");
        item.href = city.page;
        item.className = "date-item";

        if(isCompleted(date)){
          item.classList.add("completed");
        }

        item.innerHTML = `
          <span class="dot"></span>
          <span class="day">Day ${index + 1}</span>
          <span class="date">${date}</span>
        `;

        cityBox.appendChild(item);
      });

      timeline.appendChild(cityBox);
    });
  }

  function loadRealMap(){
    const map = L.map("tourMap", {
      scrollWheelZoom:false,
      worldCopyJump:true
    }).setView([20, 0], 2);

   L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution:"&copy; OpenStreetMap &copy; CARTO",
   subdomains:"abcd",
    maxZoom:20
   }).addTo(map);

    const completedIcon = L.divIcon({
      className:"custom-pin completed-pin",
      html:"<span></span>",
      iconSize:[18,18],
      iconAnchor:[9,9],
      popupAnchor:[0,-10]
    });

    const upcomingIcon = L.divIcon({
      className:"custom-pin upcoming-pin",
      html:"<span></span>",
      iconSize:[18,18],
      iconAnchor:[9,9],
      popupAnchor:[0,-10]
    });

    const bounds = [];

    tourCities.forEach(city => {
      const icon = cityCompleted(city) ? completedIcon : upcomingIcon;

      L.marker([city.lat, city.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div class="popup-city">${city.city}</div>
          <div class="popup-venue">${city.venue}</div>
          <a class="popup-link" href="${city.page}">Open city page</a>
        `);

      bounds.push([city.lat, city.lng]);
    });

    map.fitBounds(bounds, {
      padding:[35,35]
    });
  }

  loadTimeline();
  loadRealMap();


  const mapButton = document.getElementById("mapBtn");
  const mapSection = document.getElementById("interactiveMap");

  if(mapButton && mapSection){
    mapButton.addEventListener("click", function(event){
      event.preventDefault();

      const mapPosition = mapSection.getBoundingClientRect().top + window.scrollY - 20;

      window.scrollTo({
        top: mapPosition,
        behavior: "smooth"
      });
    });
  }
